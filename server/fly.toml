app = "project-mafia-server"
primary_region = "iad"

# Required secrets: FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL,
# FIREBASE_PRIVATE_KEY, and OPENAI_API_KEY.
# Set CORS_ORIGIN to the deployed client URL and CRON_SECRET to enable ticks.

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  path = "/health-check"
  protocol = "http"
  timeout = "5s"

[http_service.checks.headers]
  X-Forwarded-Proto = "https"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
