# Downtown bank heist — the hard score. Five decisions deep, brutal checks,
# serious money, serious heat. Failure here ends in a prison transport, not
# a slap on the wrist.
#
# depth 5 = 31 beats + 32 endings (63 narrations per accepted job), so the
# LLM cost per accept is ~4× a depth-3 mission.
#
# Knob reference: see docks-robbery.yml.

id: downtown-bank-heist
name: Bank Heist
type: robbery
district: Downtown

depth: 5

