storySeeds:
  - location: First Meridian Bank, Main Street branch
    premise: A locksmith who serviced the vault's day gate owes your crew money, and he'd rather pay with the service schedule than cash.
    pressure: The vault timer releases at five for the cash-transit pickup, and the guards change shift twenty minutes before it.
  - location: Union Savings & Trust
    premise: The Friday payroll for three factories sits in the counting room overnight, banded and bagged for morning pickup.
    pressure: The counting room shares a wall with the manager's office, and the manager has been sleeping there since his wife left.
  - location: The Merchants Bank armored transfer
    premise: Twice a month an armored car takes the branch's overflow cash across town, and the crew inside has gotten lazy on the loading dock.
    pressure: The dock is exposed for exactly four minutes, in full view of a tram stop.
  - location: Coastal National, safe-deposit floor
    premise: A fence wants one specific deposit box emptied and will pay triple its contents; whatever else you pull from the floor is yours.
    pressure: The floor's vibration sensors go to a private security desk, not the police — they respond faster and ask fewer questions.
  - location: First Meridian Bank, harbor branch
    premise: A teller with gambling debts can leave the side door's alarm contact taped over, one night only.
    pressure: If the audit on Monday finds the till short, the teller will talk before the first coffee.
  - location: City Provident Bank
    premise: The bank president keeps off-book money for half the council in a private vault below the records room.
    pressure: Nobody in that building can call the police — but the men they will call instead don't make arrests.
