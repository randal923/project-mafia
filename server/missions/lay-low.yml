storySeeds:
  - location: A cousin's farmhouse upstate
    premise: >-
      Your cousin owes the family a favor and has a spare room, a wood pile that needs splitting, and neighbors who don't ask questions.
    pressure: A county deputy drinks at the roadhouse two miles down and likes new faces.
  - location: The Church of St. Anselm's boarding rooms
    premise: >-
      Father Emilio rents quiet rooms to quiet men and asks only that you attend one mass and keep your hands folded.
    pressure: Half the congregation are cops' wives who never forget a face.
  - location: A fishing boat out of Riverside
    premise: >-
      Old Marek needs a deckhand for a week on the water, cash under the table and no names over the radio.
    pressure: The harbor master checks crew papers whenever the catch comes in light.
  - location: The night shift at Kowalski's garage
    premise: >-
      Kowalski will vouch for you as his new mechanic if you actually turn wrenches — honest grease under the nails is the best alibi in town.
    pressure: Squad cars fuel up there every morning at six sharp.
  - location: A rooming house on Delancey Court
    premise: >-
      Pay the landlady double, take the room under the eaves, and become the kind of tenant nobody remembers when someone knocks.
    pressure: The tenant below sells information to whoever pays for it.
