storySeeds:
  - location: Consolidated Storage, building 4
    premise: A pharmacist's wholesale order — morphine ampoules, the real thing — sits in a wire cage waiting on a signature that was never coming, and the clerk who forged the hold order wants his cut in advance.
    pressure: Consolidated runs its own inventory audit Tuesday, and the clerk gets nervous when he drinks, which is nightly.
  - location: The Hartmann Textile warehouse
    premise: Three trucks of silk bolts cleared customs under a false invoice, and the importer can't report stolen what he never legally owned.
    pressure: His own guards know what the cargo is worth, and two of them have already asked around about buyers.
  - location: Pier 14 cold storage
    premise: The freezer house holds a season of poached sturgeon roe behind a padlocked bulkhead door, and the caviar broker who owns it is in a cell awaiting arraignment.
    pressure: The compressors get serviced at midnight — for one hour the alarm circuit is down and the service crew's van is parked where yours should be.
  - location: Delancey Bros. freight depot
    premise: A rail shipment of copper wire spools was signed into the wrong bay, and the foreman will keep it lost for three more days at a price.
    pressure: Copper that heavy needs a truck and a winch, and the depot's weighbridge man logs every axle that crosses after dark.
  - location: The Excelsior bonded liquor stores
    premise: Cases of pre-war Scotch sit under a customs bond nobody has paid in a year, and the auction house that wants them quietly can't be seen buying them loudly.
    pressure: The bond office's night door runs on an electric buzzer lock, and the wire to it staples along the outside wall in plain reach.
  - location: Ironworks tool & die warehouse
    premise: A rival outfit stores its hijacked goods in a legitimate warehouse under a dead man's name, and your buyer likes the idea of stealing from thieves.
    pressure: The rival crew checks the space at odd hours, and they don't knock first.
