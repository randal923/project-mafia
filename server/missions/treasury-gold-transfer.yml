storySeeds:
  - location: Treasury annex loading court
    premise: Emergency reserve bars are moving to the central vault under a false maintenance order.
    pressure: Army escorts will seal the district as soon as the first truck misses check-in.
  - location: Federal assay office
    premise: Recast gold waits overnight between weighing and armored shipment.
    pressure: Every bar carries a numbered seal and two clerks hold separate ledgers.
  - location: Downtown mint tunnel
    premise: A service locomotive will haul bullion beneath three city blocks before dawn.
    pressure: The tunnel doors lock independently from both control rooms.
  - location: Union Station treasury siding
    premise: A diplomatic gold transfer has been disguised as ordinary express freight.
    pressure: Federal agents, railroad police, and soldiers all answer to different commanders.
