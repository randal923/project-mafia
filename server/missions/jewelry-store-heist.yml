storySeeds:
  - location: Aldermann & Fitch, Hillcrest Parade
    premise: The house jeweler to half the hill's old families keeps consignment pieces in a back-room safe the insurance company doesn't know about, because neither do the taxes.
    pressure: Mr. Fitch walks his terrier past the shop at eleven every night, and he carries the only key that stops the case alarms singing.
  - location: The Marchetti estate sale preview
    premise: A dead shipping magnate's collection sits in a rented gallery overnight before auction, guarded by men hired for their suits rather than their eyes.
    pressure: The auction house photographer catalogued every piece today — anything missing tomorrow has a portrait in evidence.
  - location: Veranelli's, the arcade shop
    premise: A tray of unmounted stones arrives Thursday for a commissioned tiara, and unmounted stones have no serial numbers, no engravings, and no history.
    pressure: The courier who brings them waits in the shop until the safe closes, and he's a retired police sergeant who misses the work.
  - location: The Pearl Room, Hotel Regent mezzanine
    premise: The hotel jeweler rents display cases wired through the building's original alarm loop — one junction box in the service stair feeds them all.
    pressure: The mezzanine is visible from the lobby bar, which serves until two, and the barman polishes glasses facing it.
  - location: Kessler Fine Watches
    premise: A smuggler paid Kessler in stolen chronographs he can't legally sell, so they sit in the workshop drawer while he loses his nerve — your fence will take them tonight, papers or no papers.
    pressure: Kessler has started sleeping badly and coming to the shop at strange hours to look at the drawer.
  - location: DuMont et Cie, the corner of Crown and Third
    premise: The window display alone is worth a season of dock work, and the shop is switching alarm companies this week — for two nights, the new wires are in and nobody is listening to them.
    pressure: The old alarm company knows the gap and has a man parked outside some nights, out of spite or hope.
