# Docks robbery — the starter mission line.
#
# Full parameter + formula reference: README.md in this folder.
# This file tunes THIS mission (difficulty, money, heat, XP, outcomes,
# story seeds). Global rules — check math, pass chances, criticals,
# momentum — live in _engine.yml.

id: docks-robbery
name: Docks Robbery
type: robbery
district: Docks

# Choices per mission run (3-5). Node count doubles per level.
depth: 3

difficulty:
  base: 1
  perRankTier: 1
  perPowerTier: 1

rewards:
  cashBase: 20
  cashPerRankTier: 45
  cashPerPowerTier: 25
  spreadBase: 10
  spreadPerRankTier: 25
  spreadPerPowerTier: 15
  xpPerDifficulty: 10

heat:
  base: 1
  perDifficulty: 0.5
  max: 12

skillExperience:
  basePerSuccess: 2
  perCheckDifficulty: 2
  criticalMultiplier: 2

outcomes:
  jackpot:
    cashFactor: 1.5
    heatFactor: 1
    heatBonus: 0
    xpFactor: 2
  successful:
    cashFactor: 1
    heatFactor: 0.5
    heatBonus: 0
    xpFactor: 1.5
  partially_successful:
    cashFactor: 0.8
    heatFactor: 1
    heatBonus: 0
    xpFactor: 1
  partial_failure:
    cashFactor: 0.25
    heatFactor: 1
    heatBonus: 2
    xpFactor: 0.5
