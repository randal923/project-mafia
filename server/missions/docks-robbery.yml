storySeeds:
  - location: Pier 9 bonded warehouse
    premise: A night-shift manifest clerk sells you the location of a cage full of untaxed cigarettes awaiting customs inspection.
    pressure: The inspection — and a police walkthrough — happens at dawn.
  - location: The trawler 'Santa Lucia'
    premise: A fishing trawler is moored overnight with a skim of gambling cash hidden under the ice in its hold.
    pressure: The crew drinks at a bar on the quay and stumbles back at random.
  - location: Harbor master's office
    premise: The harbor master keeps a week of bribe envelopes in an old floor safe before passing them up the chain.
    pressure: A private security patrol loops past the office every twenty minutes.
  - location: Container yard, row F
    premise: A mislabeled container holds counterfeit designer goods a rival crew hasn't collected yet — and its customs seal is wired to a cheap alarm anyone with steady hands could bypass.
    pressure: The rival crew's van has already been spotted circling the gate.
  - location: Dockside pawn shop
    premise: The pawnbroker who fences for half the waterfront just took in a tray of stolen watches too hot for him to move.
    pressure: He sleeps above the shop with a shotgun within reach.
  - location: Union hall back room
    premise: The dockworkers' union treasurer is skimming dues into a lockbox nobody else is supposed to know about.
    pressure: A card game in the front room runs until the early hours.
