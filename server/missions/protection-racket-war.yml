storySeeds:
  - location: The Bellafiore brothers' collection route
    premise: A crew from Ironworks has started walking your streets on Thursdays, taking envelopes from shopkeepers who used to pay you — and their bagman carries the whole route home in one satchel.
    pressure: The third shop on the route belongs to a police captain's cousin, and whatever happens there gets reported twice.
  - location: Antonelli's Trattoria, Via Perrone
    premise: The rival outfit held a dinner in Antonelli's back room to announce the neighborhood was theirs now — the neighborhood needs to watch you hold your own dinner at the same table.
    pressure: Half the guests you need to impress won't come if there's blood on the floor, and the other half won't come unless there could be.
  - location: The Corsini social club
    premise: Their crew runs collections out of a members-only club with a steel front door and a book of every merchant they've turned — take the book, and their racket unravels by itself.
    pressure: The club never empties before four, and the doorman pulls the bar across at the first strange face.
  - location: Rothstein's laundry, Carmine Street
    premise: The launderer washes the rival crew's collection money through his books, and he'd rather switch sides than press shirts for dead men — he'll hand you a week of their take as a deposit on his loyalty.
    pressure: Their counter comes for the ledgers Friday morning, and if the numbers are short they'll burn the laundry with him in it.
  - location: The Feast of San Gennaro, Old Quarter
    premise: Every stall at the street feast pays somebody, and this year the rival outfit sold 'permits' — collect their permit money out from under them in one night, in public, and the quarter knows who runs it.
    pressure: The feast crawls with off-duty patrolmen working the crowd, and the archbishop's procession passes at nine.
  - location: Vukovic's garage, the border street
    premise: The mechanic on the boundary between your territory and theirs pays both crews and hates both crews — he's offered his garage as neutral ground for a sit-down that one side doesn't intend to walk out of.
    pressure: Whoever moves first inside those walls had better finish it — the street outside belongs to nobody, and everybody brought friends.
