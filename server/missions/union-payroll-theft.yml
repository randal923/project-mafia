storySeeds:
  - location: Ironworkers Local 18 hall
    premise: Friday's cash payroll sits in the treasurer's safe before the morning shift.
    pressure: A grievance meeting has kept half the committee in the building.
  - location: Foundry paymaster office
    premise: The mill pays night crews through a barred cashier window at midnight.
    pressure: A labor dispute has put armed company guards on every gate.
  - location: Freight handlers' hiring shed
    premise: Dues and strike-fund envelopes are stacked for Monday's bank run.
    pressure: Union stewards are sleeping in shifts beside the stove.
  - location: Machine Works counting room
    premise: A crooked foreman has duplicated the payroll key and wants a share.
    pressure: His replacement is arriving early to audit the books.
