storySeeds:
  - location: Kwon's 24-hour mart
    premise: The night clerk leaves the register drawer full until the 4 a.m. pickup, and the back door's lock has been broken for a week.
    pressure: A patrol car parks across the street on its coffee break, most nights around three.
  - location: Lucky Star corner store
    premise: A week of lottery payout cash sits in a shoebox under the counter because the owner doesn't trust banks.
    pressure: The owner's nephew watches the aisles from a stool by the door, and he knows every face in the neighborhood.
  - location: Delgado's Grocery & Smoke
    premise: A wholesale cigarette delivery landed this evening and the cartons are still stacked in the storeroom, unlogged.
    pressure: The delivery driver comes back at dawn for his paperwork, and he counts boxes.
  - location: The Night Owl minimart
    premise: The store's ATM gets refilled every Friday, and the man with the key does it alone with the door propped open.
    pressure: The refill takes eleven minutes, and the camera above the machine works — the one over the door does not.
  - location: Rossi's Deli-Mart
    premise: The register takes in protection money for a local crew every month, and tonight the envelope is sitting in the office drawer.
    pressure: If the wrong people learn who took their envelope, the police will be the least of your problems.
  - location: Sunrise Convenience
    premise: The morning-shift girl sells you the safe combination for a cut, because the owner shorted her pay all summer.
    pressure: She clocks in at six, and it has to look like a break-in, not an inside job.
