storySeeds:
  - location: The Riverside viaduct underpass
    premise: A Garrison Security truck carries racetrack receipts along the river road every Sunday night, and the underpass kills its radio for ninety seconds.
    pressure: Ninety seconds — after that the driver's check-in is overdue and the dispatcher starts making calls.
  - location: Mill Street rail crossing
    premise: >-
      A retired Garrison driver sold you the schedule and one more thing: the
      rear door's lock has a factory flaw, if you know where to drill and have
      the tool to do it.
    pressure: The crossing holds the truck for four minutes when the freight passes — and the freight is sometimes early.
  - location: The Cathedral Hill switchback
    premise: The mint-run truck grinds up the hill in first gear every second Tuesday, slow as a funeral, with the month's worn-bill exchange for the federal furnace.
    pressure: Burned money is nobody's loss, so the guards are lazy — but the route was chosen because every window on the hill overlooks it.
  - location: Wexford Loan & Trust rear dock
    premise: The truck's crew takes an unauthorized coffee stop while the third man loads alone at the dock, a routine their own company would fire them for — which is why nobody has reported it.
    pressure: The stop lasts twelve minutes, and the dock camera feeds a tape machine that an inside man can only rewind once.
  - location: The Palisade Bridge tollgate
    premise: A courier truck pays the toll like everyone else, and for thirty seconds it sits in a steel queue with its engine idling and nowhere to go.
    pressure: The tollhouse keeps a shotgun under the counter and a direct line to the river patrol, and the far bank is the only way off the bridge.
  - location: Meridian Transfer garage, night bay
    premise: The trucks come home to the depot at midnight to count and re-band, and an electrician who rewired the bay knows which fuse quiets the door alarms and the lights together.
    pressure: The count crew arrives forty minutes after the trucks, and the fuse trick only works until someone checks the panel.
